name: Build ZMK (nice_nano_v2 + reviung5)

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      board:
        description: 'Zephyr board name'
        default: nice_nano_v2
        required: false
      shield:
        description: 'ZMK shield name'
        default: reviung5
        required: false
      zmk_ref:
        description: 'ZMK branch/tag/commit'
        default: main
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    # Prebuilt environment with west, dtc, Zephyr SDK/toolchains, etc.
    container: zmkfirmware/zmk-build-arm:stable

    env:
      BOARD: ${{ inputs.board  || 'nice_nano_v2' }}
      SHIELD: ${{ inputs.shield || 'reviung5' }}
      ZMK_REF: ${{ inputs.zmk_ref || 'main' }}

    steps:
      - name: Checkout zmk-config
        uses: actions/checkout@v4

      - name: Show repo layout (debug)
        run: |
          pwd
          ls -la
          echo "---- config/"
          ls -la config || true
          echo "---- boards/"
          ls -la boards || true

      - name: Clean any previous west workspace
        run: |
          rm -rf .west build

      - name: Initialize west workspace (ZMK manifest lives at app/west.yml)
        run: |
          west init -m https://github.com/zmkfirmware/zmk --mr "$ZMK_REF" --mf app/west.yml
          west update
          west zephyr-export

      - name: Pristine build (uses this repo's config/)
        run: |
          west build -s zmk/app -d build/$BOARD-$SHIELD -p always -b "$BOARD" -- \
            -DSHIELD="$SHIELD" \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cp build/$BOARD-$SHIELD/zephyr/zmk.uf2 artifacts/zmk-$BOARD-$SHIELD.uf2
          cp build/$BOARD-$SHIELD/zephyr/zmk.hex artifacts/zmk-$BOARD-$SHIELD.hex
          cp build/$BOARD-$SHIELD/zephyr/zephyr.dts artifacts/zephyr-$BOARD-$SHIELD.dts

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.BOARD }}-${{ env.SHIELD }}
          path: artifacts/*
          if-no-files-found: error
