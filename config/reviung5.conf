# ================================
# Reviung5 (6x5) — ZMK .conf
# Board: nice_nano_v2 (SuperMini nRF52840)
# Features: OLED status screen + battery %, BT controls, soft off
# ================================

# --- Display (SSD1306 via your nice_nano_v2.overlay) ---
CONFIG_ZMK_DISPLAY=y

# --- Battery reporting (shows on BLE and on the OLED) ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Optional status widgets on the OLED (uncomment if desired)
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y   # USB/BLE indicator
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y    # current layer indicator
# CONFIG_ZMK_WIDGET_WPM_STATUS=y      # words-per-minute

# --- Soft power-off (for &soft_off key binding) ---
# Lets the keyboard enter deep sleep via the keymap (&soft_off).
# Wake by reset or power cycle (and often by keypress if kscan has wakeup-source).
CONFIG_ZMK_PM_SOFT_OFF=y

# --- Encoders (not used) ---
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- RGB underglow (not used) ---
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# No special BLE config needed for &bt / &out OUT_TOG bindings.
# No special config needed for &sys_reset or &bootloader bindings.
