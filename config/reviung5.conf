# ================================
# Reviung5 (6x5) — ZMK .conf
# Board: nice_nano_v2 (SuperMini nRF52840)
# Features: OLED status screen + battery %, BT controls, soft off
# ================================

# --- Display / LVGL ---
CONFIG_ZMK_DISPLAY=y

# Monochrome LVGL + small draw buffer (works well for SSD1306 128x32)
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
# % of screen area used as buffer (must be >0)
CONFIG_LV_Z_VDB_SIZE=20

# (Do NOT set LV_Z_HOR_RES_MAX / LV_Z_VER_RES_MAX — they’re not valid here)

# --- Battery reporting (BLE + OLED widget) ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Optional extra widgets on OLED:
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=y

# --- Soft power-off key binding support ---
CONFIG_ZMK_PM_SOFT_OFF=y

# --- Not used in your build ---
# Encoders:
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
# RGB underglow:
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
