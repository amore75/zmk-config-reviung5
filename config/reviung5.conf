# =========================================
# Reviung5 (6x5) — nice_nano_v2 / SuperMini
# OLED (SSD1306 128x32 @ 0x3C), BLE, battery,
# soft-off, reset/bootloader
# =========================================

# --- Display / OLED ---
CONFIG_ZMK_DISPLAY=y

# LVGL: use 1-bit monochrome and a small draw buffer
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1

# Draw buffer as % of full screen pixels (must be > 0)
# 20% of 128x32 → ~102 bytes; safe and tiny
CONFIG_LV_Z_VDB_SIZE=20

# Explicit max resolution (matches your OLED)
CONFIG_LV_Z_HOR_RES_MAX=128
CONFIG_LV_Z_VER_RES_MAX=32

# Trim LVGL features (optional, keeps build small/stable)
CONFIG_LV_USE_LOG=n
CONFIG_LV_USE_PERF_MONITOR=n

# --- Battery on BLE and OLED ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Optional other widgets
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=y

# --- Soft power-off key binding support ---
CONFIG_ZMK_PM_SOFT_OFF=y

# --- Not used in your build ---
# Encoders:
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
# RGB underglow:
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y