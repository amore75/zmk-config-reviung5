# ================================
# Reviung5 (6x5) — ZMK .conf
# Board: nice_nano_v2 (SuperMini nRF52840)
# Features: OLED (SSD1306 128x32 @ 0x3C), battery %, BT controls, soft off
# ================================

# --- ZMK display manager ---
CONFIG_ZMK_DISPLAY=y

# --- Zephyr display driver (REQUIRED so the SSD1306 device exists) ---
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_I2C=y

# --- LVGL for small monochrome OLEDs ---
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
# % of screen area used as the draw buffer (must be > 0)
CONFIG_LV_Z_VDB_SIZE=20

# (Do NOT set LV_Z_HOR_RES_MAX / LV_Z_VER_RES_MAX; not used in this setup)

# --- Battery reporting (BLE + OLED widget) ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Optional extra widgets
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=y

# --- Soft power-off key binding support (&soft_off) ---
CONFIG_ZMK_PM_SOFT_OFF=y
