# ================================
# Reviung5 (6x5) — ZMK .conf
# Board: nice_nano_v2 (SuperMini nRF52840)
# Features: OLED status screen + battery %, no encoder, no RGB
# ================================

# --- Display (SSD1306 via your overlay) ---
CONFIG_ZMK_DISPLAY=y

# Show battery on the OLED (and report over BLE)
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Optional status widgets on the OLED (uncomment if you want them)
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y   # USB/BLE indicator
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y    # current layer indicator
# CONFIG_ZMK_WIDGET_WPM_STATUS=y      # words-per-minute

# --- Encoders (not used) ---
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- RGB underglow (not used) ---
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# --- Misc sanity (usually fine at defaults) ---
# Keep BLE on by default; your keymap has BT controls.
# (No extra Kconfig needed for &bt actions or &out OUT_TOG)

# If you later add custom power behavior keys (e.g., &soft_off),
# you usually don't need extra Kconfig here.
